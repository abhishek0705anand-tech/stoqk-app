name: Pattern Scanner

on:
  schedule:
    # 4:30 PM IST = 11:00 UTC, weekdays only
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max tickers to scan (blank = all)'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libta-lib-dev

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pattern-scanner/requirements.txt

      - name: Install Python dependencies
        run: |
          cd pattern-scanner
          pip install -r requirements.txt

      - name: Run pattern scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKEND_URL: https://stoqk-app.vercel.app
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          cd pattern-scanner
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python scanner.py --limit ${{ github.event.inputs.limit }}
          else
            python scanner.py
          fi
